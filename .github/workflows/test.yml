name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # CI only runs the pure-node unit specs (collision/hitbox/settings,
      # 44 assertions incl. the vectorized-vs-classic-cone equivalence proof)
      # — fast and fully deterministic. The browser smoke test is left to
      # local `npm test`: GitHub's hosted runners have no GPU, and headless
      # Chrome + SwiftShader software rendering proved unreliable here across
      # several attempts (a GPU-less runner refusing WebGL under --use-gl=angle,
      # then hanging on repeated navigation/context creation under SwiftShader
      # even after working around that). Rather than keep chasing runner-image
      # flakiness, the smoke test stays a required local pre-release check
      # (see CONTRIBUTING.md) instead of a CI gate.
      - name: Run unit suite
        run: npm run test:unit
